<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Please Wait...</title>
<style>
  body {
    background:#141414;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
    color:#ffffff;
    font-family:Arial, sans-serif;
    text-align:center;
  }

  .loader {
    width:110px;
    height:110px;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
  }

  .spin {
    width:110px;
    height:110px;
    animation:rotate 1s linear infinite;
  }

  @keyframes rotate {
    100% { transform:rotate(360deg); }
  }

  .icon {
    width:38px;
    height:38px;
    position:absolute;
    pointer-events:none;
  }

  h2 {
    margin:18px 0 4px 0;
  }

  p {
    margin:0;
    opacity:0.7;
    font-size:14px;
  }

  .bottom-bar {
    position:absolute;
    bottom:25px;
    background:#242424;
    padding:6px 12px;
    border-radius:8px;
    font-size:14px;
    display:flex;
    gap:6px;
  }

  .bottom-bar a {
    color:#a068ff;
    text-decoration:none;
    transition:0.25s;
  }

  .bottom-bar a:hover {
    color:#c29cff;
  }

  @media(max-width:600px){
    .loader { width:90px; height:90px; }
    .spin { width:90px; height:90px; }
    .icon { width:32px; height:32px; }
    .bottom-bar { font-size:12px; padding:5px 10px; }
  }
</style>
<script>
  setTimeout(()=>{ window.location.href="https://nexusbytedev.github.io/Portal/main/landing-page.html"; },3000);
</script>
</head>
<body>

<div class="loader">
  <svg class="spin" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="40" stroke="#a068ff" stroke-width="6" stroke-linecap="round" fill="none" stroke-dasharray="70 200"/>
  </svg>
  <img class="icon" src="https://nexusbytedev.github.io/Portal/assets/media/icons/security.png">
</div>

<h2>Please wait...</h2>
<p>We need to verify that you are human.</p>

<div class="bottom-bar">
  <span>Secured by</span> <a href="#">NexusByte Initiative</a>
</div>

</body>
</html>
